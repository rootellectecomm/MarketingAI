services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: rootellect
      POSTGRES_PASSWORD: rootellect
      POSTGRES_DB: rootellect
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rootellect"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:0.6.3
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env.example
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app -c gunicorn_conf.py"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env.example
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq app.queues.worker.WorkerSettings

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  chroma-data:
